spring:
  application:
    name: activity-service
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:27017/fitnessactivity
      database: fitnessactivity
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking